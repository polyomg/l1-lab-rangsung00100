<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        input {
            width: 50px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Your Shopping Cart</h2>
    
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Actions</th>
        </tr>
        <tr th:each="item : ${cart.items}">
            <form th:action="@{|/update/${item.id}|}" method="post">
                <td th:text="${item.id}"></td>
                <td th:text="${item.name}"></td>
                <td th:text="${item.price}"></td>
                <td>
                    <input type="number" name="qty" th:value="${item.qty}" min="1" onblur="this.form.submit()">
                </td>
                <td th:text="${item.price * item.qty}"></td>
                <td>
                    <a th:href="@{|/remove/${item.id}|}">Remove</a>
                </td>
            </form>
        </tr>
    </table>

    <h3>Total Items: <span th:text="${cart.count}"></span></h3>
    <h3>Total Amount: <span th:text="${cart.amount}"></span></h3>

    <a href="/cart/clear">Clear Cart</a> |
    <a href="/item/index">Continue Shopping</a>
</body>
</html>
