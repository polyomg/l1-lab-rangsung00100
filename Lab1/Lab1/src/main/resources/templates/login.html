<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
	crossorigin="anonymous">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
	integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
	crossorigin="anonymous"></script>
</head>
<style>
body {
	background: #007bff;
	background: linear-gradient(to right, #0062E6, #33AEFF);
}

.btn-login {
	font-size: 0.9rem;
	letter-spacing: 0.05rem;
	padding: 0.75rem 1rem;
}
</style>
<body>
	<div class="container">
		<div class="row">
			<div class="col-sm-9 col-md-7 col-lg-5 mx-auto">
				<div class="card border-0 shadow rounded-3 my-5">
					<div class="card-body p-4 p-sm-5">
						<h5 class="card-title text-center mb-5 fw-light fs-5">Đăng
							nhập</h5>
						<form th:action="@{/login/check}" method="post">
						    <div class="form-floating mb-3">
						        <input type="text" class="form-control" id="floatingInput" placeholder="Tài khoản" name="username"
						               th:value="${username != null ? username : ''}" required>
						        <label for="floatingInput">Tài khoản</label>
						        <!-- Hiển thị thông báo lỗi nếu có -->
						        <span class="text-danger" th:if="${message != null}" th:text="${message}"></span>
						    </div>
						    <div class="form-floating mb-3">
						        <input type="password" th:value="${password != null ? password : ''}"  class="form-control" id="floatingPassword" placeholder="Mật khẩu" name="password"
						               required>
						        <label for="floatingPassword">Mật khẩu</label>
						    </div>
						<div th:if="${param.success}">
						    <p class="text-success">Đăng nhập thành công!</p>
						</div>
						    <div class="d-grid">
						        <button class="btn btn-primary btn-login text-uppercase fw-bold" type="submit">Sign in</button>
						    </div>
						</form>

					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
